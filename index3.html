<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Resistor Pro Advance - Edge 50</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Bloqueo total de desplazamiento exterior */
        html, body {
            overflow: hidden;
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            user-select: none;
            touch-action: manipulation;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Variables de Temas */
        body.theme-dark { background-color: #020617; color: #f1f5f9; }
        body.theme-light { background-color: #f8fafc; color: #0f172a; }
        body.theme-blue { background-color: #bae6fd; color: #0369a1; }
        body.theme-pink { background-color: #fbcfe8; color: #9d174d; }
        body.theme-green { background-color: #bbf7d0; color: #15803d; }

        .app-container {
            height: 100dvh;
            display: flex;
            flex-direction: column;
            padding-left: 12px;
            padding-right: 12px;
            padding-top: env(safe-area-inset-top, 10px);
            padding-bottom: env(safe-area-inset-bottom, 10px);
        }

        /* Redistribución de Alturas Solicitada */
        .section-header  { height: 10%; display: flex; flex-direction: column; justify-content: center; margin-bottom: 2px; }
        .section-display { height: 20%; display: flex; flex-direction: column; justify-content: center; padding: 2px 0; gap: 4px; }
        .section-keypad  { height: 50%; display: flex; flex-direction: column; overflow: hidden; }
        .section-footer  { height: 20%; display: flex; align-items: center; gap: 12px; }

        .glass-panel {
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(128, 128, 128, 0.2);
            border-radius: 12px;
            padding: 4px 8px;
        }
        
        body.theme-dark .glass-panel { background: rgba(255, 255, 255, 0.05); }

        .theme-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
        }
        .theme-dot.active { border-color: #3b82f6; transform: scale(1.1); }

        .band-btn {
            flex: 1;
            padding: 2px 0;
            font-size: 10px;
            font-weight: 900;
            border-radius: 6px;
            transition: all 0.2s;
            color: inherit;
            opacity: 0.6;
        }
        .band-btn.active { background: #3b82f6; color: white; opacity: 1; }

        /* Estilos del Teclado Compacto */
        .color-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            column-gap: 6px; /* Aumentado 2px */
            row-gap: 6px;    /* Misma separación que horizontal */
            overflow-y: auto;
            padding-bottom: 20px;
        }
        
        .color-grid::-webkit-scrollbar { width: 0; background: transparent; }

        .color-card {
            /* Altura reducida un 60% respecto a la v2 anterior */
            height: 22px; 
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(128, 128, 128, 0.1);
            transition: transform 0.1s;
        }
        
        .color-card:active { transform: scale(0.95); }
        .color-card.disabled { opacity: 0.1; pointer-events: none; filter: grayscale(1); }

        .color-val {
            font-size: 10px;
            font-weight: 900;
            text-shadow: 0 1px 1px rgba(0,0,0,0.5);
        }

        /* Colores de las bandas */
        .c-black { background-color: #000000; color: white; }
        .c-brown { background-color: #8B4513; color: white; }
        .c-red   { background-color: #FF0000; color: white; }
        .c-orange { background-color: #FF8C00; color: white; }
        .c-yellow { background-color: #FFD700; color: black; }
        .c-green  { background-color: #008000; color: white; }
        .c-blue   { background-color: #0000FF; color: white; }
        .c-violet { background-color: #EE82EE; color: black; }
        .c-gray   { background-color: #808080; color: white; }
        .c-white  { background-color: #FFFFFF; color: black; }
        .c-gold   { background-color: #D4AF37; color: black; }
        .c-silver { background-color: #C0C0C0; color: black; }

        .res-box {
            flex: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .column-title {
            font-size: 12px; /* Doble del tamaño anterior (6px -> 12px) */
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            opacity: 0.5;
        }
    </style>
</head>
<body class="theme-dark">

<div class="app-container">
    
    <!-- BLOQUE 1: ENCABEZADO (10%) -->
    <div class="section-header border-b border-gray-500/10">
        <div class="flex justify-between items-center mb-1">
            <h1 class="text-[9px] font-black tracking-tighter uppercase italic opacity-80">Resistor Pro Advance</h1>
            <div class="flex gap-1.5 items-center">
                <div onclick="setTheme('dark')" class="theme-dot bg-slate-900 active" title="Oscuro"></div>
                <div onclick="setTheme('light')" class="theme-dot bg-white" title="Claro"></div>
                <div onclick="setTheme('blue')" class="theme-dot bg-sky-500" title="Azul"></div>
                <div onclick="setTheme('pink')" class="theme-dot bg-pink-500" title="Rosa"></div>
                <div onclick="setTheme('green')" class="theme-dot bg-emerald-500" title="Verde"></div>
            </div>
        </div>
        <div class="glass-panel flex p-0.5 gap-1">
            <button onclick="setBands(3)" id="btn-3b" class="band-btn">3B</button>
            <button onclick="setBands(4)" id="btn-4b" class="band-btn active">4B</button>
            <button onclick="setBands(5)" id="btn-5b" class="band-btn">5B</button>
            <button onclick="setBands(6)" id="btn-6b" class="band-btn">6B</button>
        </div>
    </div>

    <!-- BLOQUE 2: RESULTADOS Y GRÁFICO (20%) -->
    <div class="section-display">
        <div class="flex gap-2">
            <div class="glass-panel res-box">
                <span class="text-[7px] uppercase font-bold opacity-60">Valor</span>
                <span id="txt-val" class="text-xl font-black leading-none tracking-tighter">10k Ω</span>
            </div>
            <div class="glass-panel res-box">
                <span class="text-[7px] uppercase font-bold opacity-60">Tolerancia</span>
                <span id="txt-tol" class="text-xl font-black leading-none text-emerald-500">±5%</span>
            </div>
            <div id="box-temp" class="glass-panel res-box hidden">
                <span class="text-[7px] uppercase font-bold opacity-60">PPM</span>
                <span id="txt-temp" class="text-xl font-black leading-none text-orange-400">100</span>
            </div>
        </div>

        <div class="flex items-center justify-center">
            <svg viewBox="0 0 300 60" class="w-full h-full max-h-[55px]">
                <rect x="0" y="26" width="300" height="8" fill="#64748b" opacity="0.3" />
                <rect x="60" y="5" width="180" height="50" rx="12" fill="#d2b48c" stroke="rgba(0,0,0,0.1)" />
                <rect id="v-b1" x="85" y="5" width="12" height="50" fill="#000" />
                <rect id="v-b2" x="110" y="10" width="10" height="40" fill="#000" />
                <rect id="v-b3" x="135" y="10" width="10" height="40" fill="transparent" class="hidden" />
                <rect id="v-bm" x="160" y="10" width="10" height="40" fill="#000" />
                <rect id="v-bt" x="195" y="10" width="12" height="40" fill="#000" />
                <rect id="v-bc" x="220" y="10" width="8" height="40" fill="transparent" class="hidden" />
            </svg>
        </div>
    </div>

    <!-- BLOQUE 3: TECLADO (50%) -->
    <div class="section-keypad mt-2">
        <div class="grid grid-cols-6 column-gap-6 mb-2 px-1 text-center">
            <span class="column-title">Dígito 1</span>
            <span class="column-title">Dígito 2</span>
            <span id="kb-lbl-d3" class="column-title opacity-10">Dígito 3</span>
            <span class="column-title">Mult.</span>
            <span class="column-title">Tol.</span>
            <span id="kb-lbl-ppm" class="column-title opacity-10">PPM</span>
        </div>
        <div id="keyboard" class="color-grid flex-grow">
            <!-- JS inyecta aquí 6 botones por cada color -->
        </div>
    </div>

    <!-- BLOQUE 4: ACCIONES -->
    <div class="section-footer">
        <button class="flex-[3] bg-blue-600 h-12 rounded-xl font-black text-[11px] text-white shadow-lg active:scale-95 uppercase tracking-widest">
            Guardar Medida
        </button>
        <button class="flex-1 bg-slate-800 h-12 rounded-xl flex items-center justify-center text-xl active:scale-95 border border-white/5">
            🔦
        </button>
    </div>

</div>

<script>
    const colors = [
        { name: 'Negro', code: 'c-black', val: 0, mult: 1, tol: null, ppm: null },
        { name: 'Marrón', code: 'c-brown', val: 1, mult: 10, tol: 1, ppm: 100 },
        { name: 'Rojo', code: 'c-red', val: 2, mult: 100, tol: 2, ppm: 50 },
        { name: 'Naranja', code: 'c-orange', val: 3, mult: 1000, tol: null, ppm: 15 },
        { name: 'Amarillo', code: 'c-yellow', val: 4, mult: 10000, tol: null, ppm: 25 },
        { name: 'Verde', code: 'c-green', val: 5, mult: 100000, tol: 0.5, ppm: 20 },
        { name: 'Azul', code: 'c-blue', val: 6, mult: 1000000, tol: 0.25, ppm: 10 },
        { name: 'Violeta', code: 'c-violet', val: 7, mult: 10000000, tol: 0.1, ppm: 5 },
        { name: 'Gris', code: 'c-gray', val: 8, mult: null, tol: 0.05, ppm: 1 },
        { name: 'Blanco', code: 'c-white', val: 9, mult: null, tol: null, ppm: null },
        { name: 'Oro', code: 'c-gold', val: null, mult: 0.1, tol: 5, ppm: null },
        { name: 'Plata', code: 'c-silver', val: null, mult: 0.01, tol: 10, ppm: null }
    ];

    let currentBands = 4;

    function initKeyboard() {
        const kb = document.getElementById('keyboard');
        kb.innerHTML = '';
        
        colors.forEach(c => {
            for(let i=0; i<6; i++) {
                const btn = document.createElement('div');
                btn.id = `btn-col-${i}-color-${c.code}`;
                btn.className = `color-card ${c.code}`;
                
                let displayVal = "-";
                let isDisabled = false;

                if (i < 3) { // Dígitos 1, 2 y 3
                    displayVal = c.val !== null ? c.val : "-";
                    if (c.val === null) isDisabled = true;
                } else if (i === 3) { // Multiplicador
                    if (c.mult !== null) {
                        displayVal = c.mult < 1 ? c.mult : (c.mult >= 1000 ? (c.mult >= 1000000 ? (c.mult/1000000)+"M" : (c.mult/1000)+"k") : "x" + c.mult);
                    } else isDisabled = true;
                } else if (i === 4) { // Tolerancia
                    displayVal = c.tol !== null ? c.tol + "%" : "-";
                    if (c.tol === null) isDisabled = true;
                } else { // PPM
                    displayVal = c.ppm !== null ? c.ppm : "-";
                    if (c.ppm === null) isDisabled = true;
                }

                if(isDisabled) btn.classList.add('disabled');

                btn.innerHTML = `<span class="color-val">${displayVal}</span>`;
                kb.appendChild(btn);
            }
        });
        updateKeyboardVisuals();
    }

    function updateKeyboardVisuals() {
        for(let color of colors) {
            const btnD3 = document.getElementById(`btn-col-2-color-${color.code}`);
            const btnPPM = document.getElementById(`btn-col-5-color-${color.code}`);
            
            if (currentBands < 5) btnD3.classList.add('disabled');
            else if (color.val !== null) btnD3.classList.remove('disabled');

            if (currentBands < 6) btnPPM.classList.add('disabled');
            else if (color.ppm !== null) btnPPM.classList.remove('disabled');
        }
    }

    function setTheme(theme) {
        document.body.className = 'theme-' + theme;
        document.querySelectorAll('.theme-dot').forEach(dot => {
            dot.classList.remove('active');
            if(dot.title.toLowerCase() === (theme === 'dark' ? 'oscuro' : theme === 'light' ? 'claro' : theme)) {
                dot.classList.add('active');
            }
        });
    }

    function setBands(n) {
        currentBands = n;
        document.querySelectorAll('.band-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('btn-' + n + 'b').classList.add('active');
        
        const b3 = document.getElementById('v-b3');
        const bc = document.getElementById('v-bc');
        const boxTemp = document.getElementById('box-temp');
        const lblD3 = document.getElementById('kb-lbl-d3');
        const lblPPM = document.getElementById('kb-lbl-ppm');

        if(n >= 5) {
            b3.classList.remove('hidden');
            lblD3.classList.remove('opacity-10');
        } else {
            b3.classList.add('hidden');
            lblD3.classList.add('opacity-10');
        }

        if(n == 6) {
            bc.classList.remove('hidden');
            boxTemp.classList.remove('hidden');
            lblPPM.classList.remove('opacity-10');
        } else {
            bc.classList.add('hidden');
            boxTemp.classList.add('hidden');
            lblPPM.classList.add('opacity-10');
        }
        updateKeyboardVisuals();
    }

    window.onload = initKeyboard;
</script>

</body>
</html>
