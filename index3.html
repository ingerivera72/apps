<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Resistor PRO V2</title>
    
    <meta name="theme-color" content="#111827">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Evita que rebote toda la pantalla */
        }

        /* Contenedor de la tabla con scroll interno */
        .scroll-container {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 4px;
        }

        .color-card {
            height: 32px; /* Altura reducida para que quepan más */
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-weight: 900;
            font-size: 11px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.1s;
            text-transform: uppercase;
        }

        .color-card.active {
            border-color: #3b82f6;
            transform: scale(1.05);
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.6);
            z-index: 10;
        }

        table {
            border-spacing: 3px;
            border-collapse: separate;
            width: 100%;
        }

        th {
            font-size: 9px;
            color: #94a3b8;
            padding-bottom: 4px;
            position: sticky;
            top: 0;
            background: #0f172a;
            z-index: 20;
        }

        .resistor-svg {
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }
    </style>
</head>
<body>

    <!-- Header Fijo -->
    <header class="p-2 bg-slate-900 flex justify-between items-center border-b border-slate-800">
        <span class="text-[10px] font-black text-blue-400 tracking-tighter">RESISTOR PRO V2</span>
        <div class="flex gap-1">
            <button onclick="setBands(3)" id="btn3" class="px-2 py-1 rounded text-[9px] font-bold bg-slate-800">3B</button>
            <button onclick="setBands(4)" id="btn4" class="px-2 py-1 rounded text-[9px] font-bold bg-blue-600">4B</button>
            <button onclick="setBands(5)" id="btn5" class="px-2 py-1 rounded text-[9px] font-bold bg-slate-800">5B</button>
            <button onclick="setBands(6)" id="btn6" class="px-2 py-1 rounded text-[9px] font-bold bg-slate-800">6B</button>
        </div>
    </header>

    <!-- Resultados Fijos -->
    <div class="bg-slate-900/50 flex justify-around py-2 border-b border-slate-800">
        <div class="text-center">
            <span class="text-[8px] uppercase text-slate-500 font-bold block">Resistencia</span>
            <span id="res-val" class="text-xl font-black text-white">10 Ω</span>
        </div>
        <div class="text-center">
            <span class="text-[8px] uppercase text-slate-500 font-bold block">Tolerancia</span>
            <span id="res-tol" class="text-xl font-black text-emerald-400">±5%</span>
        </div>
    </div>

    <!-- Visualización Fija -->
    <div class="flex justify-center py-2 bg-slate-950/20">
        <svg width="220" height="60" viewBox="0 0 220 60" class="resistor-svg">
            <rect x="0" y="27" width="220" height="6" fill="#475569"/>
            <path d="M50 15 Q50 5 70 5 L150 5 Q170 5 170 15 L170 45 Q170 55 150 55 L70 55 Q50 55 50 45 Z" fill="#d2b48c" id="res-body-svg"/>
            <rect id="b1" x="65" y="5" width="10" height="50" fill="#8B4513"/>
            <rect id="b2" x="85" y="8" width="9" height="44" fill="#000"/>
            <rect id="b3" x="105" y="8" width="9" height="44" fill="#000" class="hidden"/>
            <rect id="bm" x="125" y="8" width="9" height="44" fill="#60a5fa"/>
            <rect id="bt" x="145" y="8" width="10" height="44" fill="#fbbf24"/>
            <rect id="btmp" x="160" y="5" width="8" height="50" fill="transparent" class="hidden"/>
        </svg>
    </div>

    <!-- Área con Desplazamiento (Scroll) -->
    <div class="scroll-container">
        <table class="table-fixed">
            <thead>
                <tr>
                    <th>B1</th><th>B2</th><th id="h-b3" class="opacity-10">B3</th><th>MULT</th><th>TOL</th>
                </tr>
            </thead>
            <tbody id="grid-body"></tbody>
        </table>
    </div>

    <!-- Footer de Medición -->
    <div class="p-2 bg-slate-950 border-t border-slate-800">
        <div class="flex gap-2">
            <input type="number" id="m-val" placeholder="Medida" class="flex-1 bg-slate-900 border border-slate-700 rounded p-2 text-xs text-white outline-none">
            <select id="m-unit" class="bg-slate-900 border border-slate-700 rounded px-1 text-[10px] font-bold">
                <option value="1">Ω</option>
                <option value="1000">k</option>
                <option value="1000000">M</option>
            </select>
            <div id="m-status" class="w-16 flex items-center justify-center rounded border border-dashed border-slate-700 text-[10px] font-black">
                -
            </div>
        </div>
    </div>

    <script>
        const colors = [
            { id:'black', n: 'Negro', hex: '#000000', v: 0, m: 1, t: null, c: 'white' },
            { id:'brown', n: 'Marrón', hex: '#8B4513', v: 1, m: 10, t: 1, c: 'white' },
            { id:'red', n: 'Rojo', hex: '#FF0000', v: 2, m: 100, t: 2, c: 'white' },
            { id:'orange', n: 'Naranja', hex: '#FFA500', v: 3, m: 1000, t: null, c: 'black' },
            { id:'yellow', n: 'Amarillo', hex: '#FFFF00', v: 4, m: 10000, t: null, c: 'black' },
            { id:'green', n: 'Verde', hex: '#008000', v: 5, m: 100000, t: 0.5, c: 'white' },
            { id:'blue', n: 'Azul', hex: '#0000FF', v: 6, m: 1000000, t: 0.25, c: 'white' },
            { id:'violet', n: 'Violeta', hex: '#9400D3', v: 7, m: 10000000, t: 0.1, c: 'white' },
            { id:'gray', n: 'Gris', hex: '#808080', v: 8, m: null, t: 0.05, c: 'white' },
            { id:'white', n: 'Blanco', hex: '#FFFFFF', v: 9, m: null, t: null, c: 'black' },
            { id:'gold', n: 'Oro', hex: '#D4AF37', v: null, m: 0.1, t: 5, c: 'black' },
            { id:'silver', n: 'Plata', hex: '#C0C0C0', v: null, m: 0.01, t: 10, c: 'black' }
        ];

        let state = { bands: 4, b1: 1, b2: 0, b3: 0, mult: 1, tol: 5 };

        function setBands(n) {
            state.bands = n;
            document.querySelectorAll('.band-btn').forEach(b => b.classList.remove('bg-blue-600'));
            document.getElementById('btn'+n).classList.add('bg-blue-600');
            
            document.getElementById('h-b3').classList.toggle('opacity-10', n < 5);
            document.getElementById('b3').classList.toggle('hidden', n < 5);
            render();
        }

        function render() {
            const body = document.getElementById('grid-body');
            body.innerHTML = '';
            colors.forEach(c => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${cell(c, 'b1', c.v)}</td>
                    <td>${cell(c, 'b2', c.v)}</td>
                    <td>${cell(c, 'b3', c.v, state.bands < 5)}</td>
                    <td>${cell(c, 'mult', c.m)}</td>
                    <td>${cell(c, 'tol', c.t, state.bands < 4)}</td>
                `;
                body.appendChild(tr);
            });
            updateResult();
        }

        function cell(color, type, val, disabled) {
            if (val === null) return '';
            const active = state[type] === val ? 'active' : '';
            const hide = disabled ? 'opacity-0 pointer-events-none' : '';
            let label = val;
            if (type === 'mult') label = val < 1 ? val : (val >= 1000 ? (val/1000)+'k' : 'x'+val);
            if (type === 'tol') label = val + '%';
            
            return `<div onclick="pick('${type}', ${val}, '${color.hex}')" 
                         class="color-card ${active} ${hide}" 
                         style="background:${color.hex}; color:${color.c}">${label}</div>`;
        }

        function pick(type, val, hex) {
            state[type] = val;
            const map = { b1: 'b1', b2: 'b2', b3: 'b3', mult: 'bm', tol: 'bt' };
            document.getElementById(map[type]).setAttribute('fill', hex);
            render();
        }

        function updateResult() {
            let base = state.bands < 5 ? (state.b1 * 10 + state.b2) : (state.b1 * 100 + state.b2 * 10 + state.b3);
            let total = base * state.mult;
            document.getElementById('res-val').innerText = total >= 1000 ? (total/1000).toFixed(2) + ' kΩ' : total.toFixed(1) + ' Ω';
            const tVal = state.bands === 3 ? 20 : state.tol;
            document.getElementById('res-tol').innerText = `±${tVal}%`;
            validate();
        }

        function validate() {
            const inp = document.getElementById('m-val');
            const val = parseFloat(inp.value) * parseFloat(document.getElementById('m-unit').value);
            if (isNaN(val)) return;
            
            let theo = (state.bands < 5 ? (state.b1 * 10 + state.b2) : (state.b1 * 100 + state.b2 * 10 + state.b3)) * state.mult;
            const tol = (state.bands === 3 ? 20 : state.tol) / 100;
            const ok = val >= theo * (1 - tol) && val <= theo * (1 + tol);
            
            const st = document.getElementById('m-status');
            st.innerText = ok ? "OK" : "ERR";
            st.style.color = ok ? "#10b981" : "#ef4444";
            st.style.borderColor = ok ? "#10b981" : "#ef4444";
        }

        document.getElementById('m-val').oninput = validate;
        document.getElementById('m-unit').onchange = validate;

        setBands(4);
    </script>
</body>
</html>
