<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Resistor Pro Advance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body {
            overflow: hidden;
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            user-select: none;
            touch-action: none;
        }

        /* Temas Solicitados */
        body.theme-light { background-color: #f8fafc; color: #0f172a; }
        body.theme-dark { background-color: #0f172a; color: #f1f5f9; }
        body.theme-green { background-color: #dcfce7; color: #166534; } /* Verde Pastel */
        body.theme-blue { background-color: #e0f2fe; color: #075985; }  /* Azul Pastel */
        body.theme-pink { background-color: #fce7f3; color: #9d174d; }  /* Rosa Pastel */

        .app-container {
            height: 100dvh;
            display: flex;
            flex-direction: column;
            padding: env(safe-area-inset-top, 8px) 12px env(safe-area-inset-bottom, 8px);
        }

        .section-header  { height: 10%; display: flex; flex-direction: column; justify-content: center; }
        .section-display { height: 15%; display: flex; flex-direction: column; justify-content: center; }
        .section-keypad  { height: 55%; display: flex; flex-direction: column; }
        .section-toolblock { height: 20%; display: flex; flex-direction: column; gap: 4px; padding-top: 4px; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
        }
        
        .theme-dark .glass-panel { background: rgba(255, 255, 255, 0.1); border-color: rgba(255,255,255,0.1); }

        .band-btn {
            flex: 1; padding: 6px 0; font-size: 11px; font-weight: 900; border-radius: 8px;
            transition: all 0.2s; color: inherit; opacity: 0.5;
        }
        .band-btn.active { background: #3b82f6; color: white; opacity: 1; }

        /* Colores de las Teclas */
        .c-black { background-color: #000000; color: white; }
        .c-brown { background-color: #5d2e0a; color: white; }
        .c-red { background-color: #dc2626; color: white; }
        .c-orange { background-color: #ea580c; color: white; }
        .c-yellow { background-color: #eab308; color: black; }
        .c-green { background-color: #166534; color: white; }
        .c-blue { background-color: #1e40af; color: white; }
        .c-violet { background-color: #7c3aed; color: white; }
        .c-gray { background-color: #64748b; color: white; }
        .c-white { background-color: #ffffff; color: black; border: 1px solid #ccc; }
        .c-gold { background-color: #b8860b; color: white; }
        .c-silver { background-color: #cbd5e1; color: black; }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(var(--cols, 4), 1fr);
            column-gap: 8px; 
            row-gap: 4px;
            flex-grow: 1;
        }

        .color-card {
            height: 34px; 
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(0,0,0,0.2);
        }
        
        .color-card.selected {
            outline: 3px solid #3b82f6;
            outline-offset: 1px;
        }

        .color-val { font-size: 12px; font-weight: 900; }

        .column-title { font-size: 9px; font-weight: 900; opacity: 0.7; text-transform: uppercase; margin-bottom: 2px; }

        .result-text { font-size: 1.6rem; font-weight: 900; }

        /* Mini-Barra con líneas de separación de 2px para accesibilidad */
        #mini-preview-bar {
            height: 20px;
            border-radius: 6px;
            display: flex;
            overflow: hidden;
            border: 2px solid #000;
            margin-top: 4px;
            background: #d2b48c;
        }
        
        .mini-segment { 
            flex: 1; 
            height: 100%; 
            border-right: 2px solid #000; /* Línea de separación ancha solicitada */
            box-sizing: border-box;
        }
        .mini-segment:last-child { border-right: none; }

        .status-box {
            height: 40px; border-radius: 8px; display: flex;
            align-items: center; justify-content: center; font-weight: 900;
            font-size: 12px;
        }
        .status-off { background: rgba(128,128,128,0.1); color: gray; }
        .status-ok { background: #16a34a; color: white; }
        .status-fail { background: #dc2626; color: white; }

        input[type="number"] {
            background: white;
            border: 2px solid #000;
            border-radius: 8px;
            height: 40px;
            width: 100px;
            color: #000;
            font-weight: 900;
            text-align: center;
        }

        .hidden-col { display: none !important; }
    </style>
</head>
<body class="theme-light">

<div class="app-container">
    
    <div class="section-header">
        <div class="flex justify-between items-center mb-1">
            <h1 class="text-[10px] font-black uppercase italic">Resistor Pro</h1>
            <div class="flex gap-1.5 items-center">
                <button onclick="setTheme('light')" class="w-4 h-4 rounded-full bg-white border border-slate-400"></button>
                <button onclick="setTheme('dark')" class="w-4 h-4 rounded-full bg-slate-900 border border-slate-400"></button>
                <button onclick="setTheme('green')" class="w-4 h-4 rounded-full bg-green-200 border border-slate-400"></button>
                <button onclick="setTheme('blue')" class="w-4 h-4 rounded-full bg-blue-200 border border-slate-400"></button>
                <button onclick="setTheme('pink')" class="w-4 h-4 rounded-full bg-pink-200 border border-slate-400"></button>
            </div>
        </div>
        <div class="glass-panel flex p-1 gap-1">
            <button onclick="setBands(3)" id="btn-3b" class="band-btn">3B</button>
            <button onclick="setBands(4)" id="btn-4b" class="band-btn active">4B</button>
            <button onclick="setBands(5)" id="btn-5b" class="band-btn">5B</button>
            <button onclick="setBands(6)" id="btn-6b" class="band-btn">6B</button>
        </div>
    </div>

    <div class="section-display">
        <div class="flex gap-2 h-1/2 mb-1">
            <div class="glass-panel flex-1 text-center flex flex-col justify-center">
                <span id="txt-val" class="result-text tracking-tighter">--</span>
            </div>
            <div class="glass-panel flex-1 text-center flex flex-col justify-center">
                <span id="txt-tol" class="result-text text-blue-600">--</span>
            </div>
        </div>
        <div class="h-1/2 flex items-center justify-center">
            <svg id="resistor-svg" viewBox="0 0 300 60" class="w-full h-8">
                <rect x="0" y="27" width="300" height="6" fill="#94a3b8" />
                <rect x="60" y="5" width="180" height="50" rx="10" fill="#d2b48c" />
                <rect id="v-b1" x="80" y="5" width="12" height="50" fill="#000" />
                <rect id="v-b2" x="105" y="5" width="12" height="50" fill="#000" />
                <rect id="v-b3" x="130" y="5" width="12" height="50" fill="#000" />
                <rect id="v-bm" x="160" y="5" width="12" height="50" fill="#000" />
                <rect id="v-bt" x="195" y="5" width="12" height="50" fill="#000" />
                <rect id="v-bc" x="220" y="5" width="10" height="50" fill="#000" />
            </svg>
        </div>
    </div>

    <div class="section-keypad">
        <div id="keyboard-labels" class="grid gap-x-1 text-center mb-1">
            <span class="column-title">B1</span>
            <span class="column-title">B2</span>
            <span id="lbl-b3" class="column-title">B3</span>
            <span class="column-title">MULT</span>
            <span id="lbl-tol" class="column-title">TOL</span>
            <span id="lbl-ppm" class="column-title">PPM</span>
        </div>
        <div id="keyboard" class="color-grid"></div>
    </div>

    <div class="section-toolblock">
        <div class="glass-panel p-2 flex flex-col gap-1">
            <span class="text-[10px] font-black uppercase">Multímetro</span>
            <div class="flex items-center gap-2">
                <input type="number" id="meter-input" placeholder="0.0" oninput="handleMeterInput()">
                <select id="meter-unit" onchange="handleMeterInput()" class="bg-white/50 h-10 px-1 rounded-lg font-bold">
                    <option value="1">Ω</option>
                    <option value="1000">KΩ</option>
                    <option value="1000000">MΩ</option>
                </select>
                <div id="meter-status" class="status-box status-off flex-grow">OFF</div>
            </div>
            <div id="mini-preview-bar"></div>
        </div>
        <div class="glass-panel p-2 flex justify-around">
            <div class="text-center">
                <div class="text-[8px] uppercase font-bold opacity-50">Mínimo</div>
                <div id="range-min" class="text-xs font-black">--</div>
            </div>
            <div class="text-center">
                <div class="text-[8px] uppercase font-bold opacity-50">Máximo</div>
                <div id="range-max" class="text-xs font-black">--</div>
            </div>
            <div class="text-center">
                <div class="text-[8px] uppercase font-bold text-blue-500">E12 Sug.</div>
                <div id="suggest-e12" class="text-xs font-black">--</div>
            </div>
        </div>
    </div>

</div>

<script>
    const colors = [
        { code: 'c-black', hex: '#000000', val: 0, mult: 1, tol: null, ppm: 250 },
        { code: 'c-brown', hex: '#5d2e0a', val: 1, mult: 10, tol: 1, ppm: 100 },
        { code: 'c-red', hex: '#dc2626', val: 2, mult: 100, tol: 2, ppm: 50 },
        { code: 'c-orange', hex: '#ea580c', val: 3, mult: 1000, tol: null, ppm: 15 },
        { code: 'c-yellow', hex: '#eab308', val: 4, mult: 10000, tol: null, ppm: 25 },
        { code: 'c-green', hex: '#166534', val: 5, mult: 100000, tol: 0.5, ppm: 20 },
        { code: 'c-blue', hex: '#1e40af', val: 6, mult: 1000000, tol: 0.25, ppm: 10 },
        { code: 'c-violet', hex: '#7c3aed', val: 7, mult: 10000000, tol: 0.1, ppm: 5 },
        { code: 'c-gray', hex: '#64748b', val: 8, mult: null, tol: 0.05, ppm: 1 },
        { code: 'c-white', hex: '#ffffff', val: 9, mult: null, tol: null, ppm: null },
        { code: 'c-gold', hex: '#b8860b', val: null, mult: 0.1, tol: 5, ppm: null },
        { code: 'c-silver', hex: '#cbd5e1', val: null, mult: 0.01, tol: 10, ppm: null }
    ];

    const E12 = [1.0, 1.2, 1.5, 1.8, 2.2, 2.7, 3.3, 3.9, 4.7, 5.6, 6.8, 8.2];
    let currentBands = 4;
    let selections = { b1: 1, b2: 0, b3: 0, mult: 100, tol: 5, ppm: 100 };
    let nominalValue = 1000;

    function initKeyboard() {
        const kb = document.getElementById('keyboard');
        kb.innerHTML = '';
        colors.forEach(c => {
            for(let i=0; i<6; i++) {
                const btn = document.createElement('div');
                btn.id = `btn-col-${i}-${c.code}`;
                btn.className = `color-card ${c.code} col-type-${i}`;
                let displayVal = "";
                let isUsable = false;

                if (i < 3) { displayVal = c.val !== null ? c.val : ""; isUsable = c.val !== null; }
                else if (i === 3) { displayVal = c.mult !== null ? (c.mult < 1 ? c.mult : (c.mult >= 1000 ? (c.mult/1000)+"k" : "x"+c.mult)) : ""; isUsable = c.mult !== null; }
                else if (i === 4) { displayVal = c.tol !== null ? c.tol + "%" : ""; isUsable = c.tol !== null; }
                else if (i === 5) { displayVal = c.ppm !== null ? c.ppm : ""; isUsable = c.ppm !== null; }

                if (!isUsable) btn.style.visibility = 'hidden';
                btn.onclick = () => selectColor(i, c);
                btn.innerHTML = `<span class="color-val">${displayVal}</span>`;
                kb.appendChild(btn);
            }
        });
        setBands(4);
    }

    function selectColor(col, color) {
        const keys = ['b1', 'b2', 'b3', 'mult', 'tol', 'ppm'];
        selections[keys[col]] = (col === 3) ? color.mult : (col === 4 ? color.tol : (col === 5 ? color.ppm : color.val));
        updateUI();
    }

    function updateUI() {
        const svgIds = ['v-b1', 'v-b2', 'v-b3', 'v-bm', 'v-bt', 'v-bc'];
        const keys = ['b1', 'b2', 'b3', 'mult', 'tol', 'ppm'];
        document.querySelectorAll('.color-card').forEach(el => el.classList.remove('selected'));
        keys.forEach((key, idx) => {
            const val = selections[key];
            let colorObj;
            if (key === 'mult') colorObj = colors.find(c => c.mult === val);
            else if (key === 'tol') colorObj = colors.find(c => c.tol === val);
            else if (key === 'ppm') colorObj = colors.find(c => c.ppm === val);
            else colorObj = colors.find(c => c.val === val);
            if (colorObj) {
                const svgRect = document.getElementById(svgIds[idx]);
                if (svgRect) svgRect.setAttribute('fill', colorObj.hex);
                const btn = document.getElementById(`btn-col-${idx}-${colorObj.code}`);
                if (btn) btn.classList.add('selected');
            }
        });
        calculate();
    }

    function formatVal(v) {
        if (v >= 1000000) return (v/1000000).toFixed(1).replace(/\.0$/, '') + " MΩ";
        if (v >= 1000) return (v/1000).toFixed(1).replace(/\.0$/, '') + " kΩ";
        return v.toFixed(1).replace(/\.0$/, '') + " Ω";
    }

    function calculate() {
        let val = (currentBands < 5) ? (selections.b1 * 10 + selections.b2) : (selections.b1 * 100 + selections.b2 * 10 + selections.b3);
        nominalValue = val * selections.mult;
        let tolPerc = currentBands === 3 ? 20 : selections.tol;
        document.getElementById('txt-val').innerText = formatVal(nominalValue);
        document.getElementById('txt-tol').innerText = "±" + tolPerc + "%";
        
        let min = nominalValue * (1 - tolPerc/100);
        let max = nominalValue * (1 + tolPerc/100);
        document.getElementById('range-min').innerText = formatVal(min);
        document.getElementById('range-max').innerText = formatVal(max);
        
        let log = Math.log10(nominalValue);
        let power = Math.floor(log);
        let base = nominalValue / Math.pow(10, power);
        let upper = E12[E12.length-1];
        for(let i=0; i<E12.length; i++) { if(E12[i] >= base) { upper = E12[i]; break; } }
        document.getElementById('suggest-e12').innerText = formatVal(upper * Math.pow(10, power));
        validateMeter();
    }

    function validateMeter() {
        const input = document.getElementById('meter-input');
        const status = document.getElementById('meter-status');
        if (!input.value) { status.className = "status-box status-off flex-grow"; status.innerText = "OFF"; return; }
        let measured = parseFloat(input.value) * parseFloat(document.getElementById('meter-unit').value);
        let tolPerc = currentBands === 3 ? 20 : selections.tol;
        let diff = ((measured - nominalValue) / nominalValue) * 100;
        if (Math.abs(diff) <= tolPerc) { status.className = "status-box status-ok flex-grow"; status.innerText = `OK (${diff > 0 ? '+':''}${diff.toFixed(1)}%)`; }
        else { status.className = "status-box status-fail flex-grow"; status.innerText = `FALLA (${diff > 0 ? '+':''}${diff.toFixed(1)}%)`; }
    }

    function handleMeterInput() {
        validateMeter();
        updateMiniPreview();
    }

    function updateMiniPreview() {
        const input = document.getElementById('meter-input');
        const bar = document.getElementById('mini-preview-bar');
        bar.innerHTML = "";
        if (!input.value) return;

        let val = parseFloat(input.value) * parseFloat(document.getElementById('meter-unit').value);
        let exp = Math.floor(Math.log10(val));
        let mantissa = val / Math.pow(10, exp);
        
        let pColors = [];
        if (currentBands < 5) {
            let v = Math.round(mantissa * 10) / 10;
            if (v >= 10) { v /= 10; exp++; }
            pColors.push(colors.find(c => c.val === Math.floor(v)).hex);
            pColors.push(colors.find(c => c.val === Math.round((v % 1) * 10)).hex);
            let m = Math.pow(10, exp - 1);
            let mObj = colors.find(c => c.mult >= m * 0.9 && c.mult <= m * 1.1);
            if (mObj) pColors.push(mObj.hex);
        } else {
            let v = Math.round(mantissa * 100) / 100;
            if (v >= 10) { v /= 10; exp++; }
            pColors.push(colors.find(c => c.val === Math.floor(v)).hex);
            pColors.push(colors.find(c => c.val === Math.floor((v * 10) % 10)).hex);
            pColors.push(colors.find(c => c.val === Math.round((v * 100) % 10)).hex);
            let m = Math.pow(10, exp - 2);
            let mObj = colors.find(c => c.mult >= m * 0.9 && c.mult <= m * 1.1);
            if (mObj) pColors.push(mObj.hex);
        }
        let tolObj = colors.find(c => c.tol === selections.tol) || colors.find(c => c.code === 'c-gold');
        pColors.push(tolObj.hex);

        pColors.forEach(hex => {
            let seg = document.createElement('div');
            seg.className = "mini-segment";
            seg.style.backgroundColor = hex;
            bar.appendChild(seg);
        });
    }

    function setBands(n) {
        currentBands = n;
        document.querySelectorAll('.band-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-'+n+'b').classList.add('active');

        // Visibilidad SVG
        document.getElementById('v-b3').style.display = (n < 5) ? 'none' : 'block';
        document.getElementById('v-bt').style.display = (n === 3) ? 'none' : 'block';
        document.getElementById('v-bc').style.display = (n < 6) ? 'none' : 'block';

        // Visibilidad Etiquetas
        document.getElementById('lbl-b3').classList.toggle('hidden-col', n < 5);
        document.getElementById('lbl-tol').classList.toggle('hidden-col', n === 3);
        document.getElementById('lbl-ppm').classList.toggle('hidden-col', n < 6);

        // Visibilidad Botones de Colores
        document.querySelectorAll('.col-type-2').forEach(el => el.classList.toggle('hidden-col', n < 5));
        document.querySelectorAll('.col-type-4').forEach(el => el.classList.toggle('hidden-col', n === 3));
        document.querySelectorAll('.col-type-5').forEach(el => el.classList.toggle('hidden-col', n < 6));

        // Reajuste de columnas de la cuadrícula
        let colCount = 4;
        if (n === 5) colCount = 5;
        if (n === 6) colCount = 6;
        document.getElementById('keyboard').style.setProperty('--cols', colCount);
        document.getElementById('keyboard-labels').style.gridTemplateColumns = `repeat(${colCount}, 1fr)`;

        updateUI();
    }

    function setTheme(t) { document.body.className = 'theme-' + t; }

    window.onload = initKeyboard;
</script>
</body>
</html>
