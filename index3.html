<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Resistor Pro Advance - Edge 50</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Bloqueo total de desplazamiento exterior */
        html, body {
            overflow: hidden;
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            user-select: none;
            touch-action: manipulation;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Variables de Temas */
        body.theme-dark { background-color: #020617; color: #f1f5f9; }
        body.theme-light { background-color: #f8fafc; color: #0f172a; }
        body.theme-blue { background-color: #bae6fd; color: #0369a1; }
        body.theme-pink { background-color: #fbcfe8; color: #9d174d; }
        body.theme-green { background-color: #bbf7d0; color: #15803d; }

        .app-container {
            height: 100dvh;
            display: flex;
            flex-direction: column;
            padding-left: 16px;
            padding-right: 16px;
            padding-top: env(safe-area-inset-top, 20px);
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }

        /* Redistribución de Alturas Final */
        .section-header  { height: 15%; display: flex; flex-direction: column; justify-content: center; gap: 4px; }
        .section-display { height: 20%; display: flex; flex-direction: column; justify-content: space-evenly; padding: 4px 0; }
        .section-keypad  { height: 45%; display: flex; flex-direction: column; overflow: hidden; }
        .section-footer  { height: 20%; display: flex; align-items: center; gap: 12px; }

        .glass-panel {
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(128, 128, 128, 0.2);
            border-radius: 12px;
            padding: 4px 8px;
        }
        
        body.theme-dark .glass-panel { background: rgba(255, 255, 255, 0.05); }

        .theme-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .theme-dot.active { border-color: #3b82f6; transform: scale(1.15); }

        .band-btn {
            flex: 1;
            padding: 6px 0;
            font-size: 10px;
            font-weight: 900;
            border-radius: 8px;
            transition: all 0.2s;
            color: inherit;
            opacity: 0.6;
        }
        .band-btn.active { background: #3b82f6; color: white; opacity: 1; }

        /* Estilos del Teclado de Colores */
        .color-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            overflow-y: auto;
            padding-right: 4px;
        }
        
        /* Ocultar barra de scroll pero permitir scroll */
        .color-grid::-webkit-scrollbar { width: 0; background: transparent; }

        .color-card {
            aspect-ratio: 1/1.1;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 2px solid rgba(128, 128, 128, 0.1);
            transition: transform 0.1s, border-color 0.2s;
        }
        
        .color-card:active { transform: scale(0.9); }
        .color-card.selected { border-color: #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }

        .color-val {
            font-size: 16px;
            font-weight: 900;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .color-name {
            font-size: 7px;
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 2px;
            opacity: 0.8;
        }

        /* Colores específicos de las bandas */
        .c-black { background-color: #000000; color: white; }
        .c-brown { background-color: #8B4513; color: white; }
        .c-red   { background-color: #FF0000; color: white; }
        .c-orange { background-color: #FF8C00; color: white; }
        .c-yellow { background-color: #FFD700; color: black; }
        .c-green  { background-color: #008000; color: white; }
        .c-blue   { background-color: #0000FF; color: white; }
        .c-violet { background-color: #EE82EE; color: black; }
        .c-gray   { background-color: #808080; color: white; }
        .c-white  { background-color: #FFFFFF; color: black; }
        .c-gold   { background-color: #D4AF37; color: black; }
        .c-silver { background-color: #C0C0C0; color: black; }

        .res-box {
            flex: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
    </style>
</head>
<body class="theme-dark">

<div class="app-container">
    
    <!-- BLOQUE 1: ENCABEZADO (15%) -->
    <div class="section-header border-b border-gray-500/10">
        <div class="flex justify-between items-center">
            <h1 class="text-[12px] font-black tracking-tighter uppercase italic">Resistor Pro Advance</h1>
            <div class="glass-panel flex gap-2 items-center">
                <div onclick="setTheme('dark')" class="theme-dot bg-slate-900 active" title="Oscuro"></div>
                <div onclick="setTheme('light')" class="theme-dot bg-white" title="Claro"></div>
                <div onclick="setTheme('blue')" class="theme-dot bg-sky-500" title="Azul"></div>
                <div onclick="setTheme('pink')" class="theme-dot bg-pink-500" title="Rosa"></div>
                <div onclick="setTheme('green')" class="theme-dot bg-emerald-500" title="Verde"></div>
            </div>
        </div>
        <div class="glass-panel flex p-1 gap-1">
            <button onclick="setBands(3)" id="btn-3b" class="band-btn">3B</button>
            <button onclick="setBands(4)" id="btn-4b" class="band-btn active">4B</button>
            <button onclick="setBands(5)" id="btn-5b" class="band-btn">5B</button>
            <button onclick="setBands(6)" id="btn-6b" class="band-btn">6B</button>
        </div>
    </div>

    <!-- BLOQUE 2: RESULTADOS Y GRÁFICO (20%) -->
    <div class="section-display">
        <div class="flex gap-2">
            <div class="glass-panel res-box">
                <span class="text-[7px] uppercase font-bold opacity-60">Valor</span>
                <span id="txt-val" class="text-xl font-black leading-none tracking-tighter">10k Ω</span>
            </div>
            <div class="glass-panel res-box">
                <span class="text-[7px] uppercase font-bold opacity-60">Tolerancia</span>
                <span id="txt-tol" class="text-xl font-black leading-none text-emerald-500">±5%</span>
            </div>
            <div id="box-temp" class="glass-panel res-box hidden">
                <span class="text-[7px] uppercase font-bold opacity-60">PPM</span>
                <span id="txt-temp" class="text-xl font-black leading-none text-orange-400">100</span>
            </div>
        </div>

        <div class="flex items-center justify-center pt-2">
            <svg viewBox="0 0 300 80" class="w-full h-full max-h-[75px]">
                <rect x="0" y="36" width="300" height="8" fill="#64748b" opacity="0.3" />
                <rect x="60" y="10" width="180" height="60" rx="15" fill="#d2b48c" stroke="rgba(0,0,0,0.1)" />
                <rect id="v-b1" x="85" y="10" width="12" height="60" fill="#000" />
                <rect id="v-b2" x="110" y="15" width="10" height="50" fill="#000" />
                <rect id="v-b3" x="135" y="15" width="10" height="50" fill="transparent" class="hidden" />
                <rect id="v-bm" x="160" y="15" width="10" height="50" fill="#000" />
                <rect id="v-bt" x="195" y="15" width="12" height="50" fill="#000" />
                <rect id="v-bc" x="220" y="15" width="8" height="50" fill="transparent" class="hidden" />
            </svg>
        </div>
    </div>

    <!-- BLOQUE 3: TECLADO DE COLORES (45%) -->
    <div class="section-keypad">
        <div class="grid grid-cols-4 gap-2 mb-2 px-1 text-center font-black text-[8px] opacity-40 uppercase tracking-widest">
            <span>Dig 1</span>
            <span>Dig 2</span>
            <span id="lbl-b3">Mult</span>
            <span>Tol</span>
        </div>
        <div id="keyboard" class="color-grid flex-grow">
            <!-- Los botones se generarán con JS para mayor limpieza -->
        </div>
    </div>

    <!-- BLOQUE 4: ACCIONES (20%) -->
    <div class="section-footer">
        <button class="flex-[3] bg-blue-600 h-16 rounded-3xl font-black text-[12px] text-white shadow-lg active:scale-95 uppercase tracking-widest">
            Guardar Medida
        </button>
        <button class="flex-1 bg-slate-800 h-16 rounded-3xl flex items-center justify-center text-2xl active:scale-95 border border-white/5">
            🔦
        </button>
    </div>

</div>

<script>
    const colors = [
        { name: 'Negro', code: 'c-black', val: 0, mult: 1, tol: null },
        { name: 'Marrón', code: 'c-brown', val: 1, mult: 10, tol: 1, ppm: 100 },
        { name: 'Rojo', code: 'c-red', val: 2, mult: 100, tol: 2, ppm: 50 },
        { name: 'Naranja', code: 'c-orange', val: 3, mult: 1000, tol: null, ppm: 15 },
        { name: 'Amarillo', code: 'c-yellow', val: 4, mult: 10000, tol: null, ppm: 25 },
        { name: 'Verde', code: 'c-green', val: 5, mult: 100000, tol: 0.5, ppm: 20 },
        { name: 'Azul', code: 'c-blue', val: 6, mult: 1000000, tol: 0.25, ppm: 10 },
        { name: 'Violeta', code: 'c-violet', val: 7, mult: 10000000, tol: 0.1, ppm: 5 },
        { name: 'Gris', code: 'c-gray', val: 8, mult: null, tol: 0.05, ppm: 1 },
        { name: 'Blanco', code: 'c-white', val: 9, mult: null, tol: null, ppm: null },
        { name: 'Oro', code: 'c-gold', val: null, mult: 0.1, tol: 5, ppm: null },
        { name: 'Plata', code: 'c-silver', val: null, mult: 0.01, tol: 10, ppm: null }
    ];

    function initKeyboard() {
        const kb = document.getElementById('keyboard');
        kb.innerHTML = '';
        
        colors.forEach(c => {
            // Fila de botones (uno por cada columna lógica)
            for(let i=0; i<4; i++) {
                const btn = document.createElement('div');
                btn.className = `color-card ${c.code}`;
                
                let displayVal = "";
                if(i < 2) displayVal = c.val !== null ? c.val : "-";
                else if(i === 2) displayVal = c.mult !== null ? "x" + (c.mult < 1 ? c.mult : c.mult.toString().charAt(0) + "0^" + (c.mult.toString().length-1)) : "-";
                else displayVal = c.tol !== null ? c.tol + "%" : "-";

                btn.innerHTML = `<span class="color-val">${displayVal}</span><span class="color-name">${c.name.substring(0,3)}</span>`;
                kb.appendChild(btn);
            }
        });
    }

    function setTheme(theme) {
        document.body.className = 'theme-' + theme;
        document.querySelectorAll('.theme-dot').forEach(dot => {
            dot.classList.remove('active');
            if(dot.title.toLowerCase() === (theme === 'dark' ? 'oscuro' : theme === 'light' ? 'claro' : theme)) {
                dot.classList.add('active');
            }
        });
    }

    function setBands(n) {
        document.querySelectorAll('.band-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('btn-' + n + 'b').classList.add('active');
        
        const b3 = document.getElementById('v-b3');
        const bc = document.getElementById('v-bc');
        const boxTemp = document.getElementById('box-temp');
        const lblB3 = document.getElementById('lbl-b3');

        if(n >= 5) {
            b3.classList.remove('hidden');
            lblB3.innerText = "Dig 3";
        } else {
            b3.classList.add('hidden');
            lblB3.innerText = "Mult";
        }

        if(n == 6) {
            bc.classList.remove('hidden');
            boxTemp.classList.remove('hidden');
        } else {
            bc.classList.add('hidden');
            boxTemp.classList.add('hidden');
        }
    }

    window.onload = initKeyboard;
</script>

</body>
</html>
