<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Resistor Master V2 - Edge 50</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Bloqueo total de desplazamiento para asegurar "Single Screen" */
        html, body {
            overflow: hidden;
            height: 100%;
            width: 100%;
            background-color: #020617; /* Fondo oscuro profundo */
            margin: 0;
            padding: 0;
            color: #f1f5f9;
            user-select: none; /* Evita selección de texto accidental */
            touch-action: manipulation;
        }

        /* Contenedor principal adaptado al área segura del Motorola */
        .app-container {
            height: 100dvh;
            display: flex;
            flex-direction: column;
            padding-left: 16px;
            padding-right: 16px;
            /* Considera el notch y la barra de gestos inferior */
            padding-top: env(safe-area-inset-top, 20px);
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }

        /* Definición estricta de secciones por altura */
        .section-display { height: 15%; display: flex; flex-direction: column; justify-content: center; }
        .section-graph   { height: 15%; display: flex; align-items: center; justify-content: center; }
        .section-keypad  { height: 57%; display: flex; flex-direction: column; }
        .section-footer  { height: 13%; display: flex; align-items: center; gap: 12px; }

        /* Estilo para los slots de colores (proporción 1:1) */
        .color-slot {
            aspect-ratio: 1 / 1;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 900;
            transition: transform 0.1s ease;
        }

        .color-slot:active {
            transform: scale(0.92);
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <!-- BLOQUE 1: PANTALLA DE DATOS (15%) -->
    <div class="section-display">
        <div class="flex justify-between items-center mb-1 px-1">
            <h1 class="text-[10px] font-black tracking-[0.2em] text-blue-500 uppercase">Resistor Pro V2</h1>
            <span class="text-[8px] font-bold text-slate-600">FES ARAGÓN EDITION</span>
        </div>
        <div class="flex h-20 bg-slate-900/90 rounded-2xl border border-white/5 items-center justify-around shadow-2xl">
            <div class="text-center">
                <p class="text-[8px] text-slate-500 font-black uppercase mb-1">Resistencia</p>
                <p id="res-val" class="text-3xl font-black text-white leading-none tracking-tight">--- Ω</p>
            </div>
            <div class="w-px h-10 bg-white/10"></div>
            <div class="text-center">
                <p class="text-[8px] text-slate-500 font-black uppercase mb-1">Tolerancia</p>
                <p id="res-tol" class="text-3xl font-black text-emerald-400 leading-none">-- %</p>
            </div>
        </div>
    </div>

    <!-- BLOQUE 2: GRÁFICO (15%) -->
    <div class="section-graph">
        <!-- SVG optimizado para el ancho del Motorola -->
        <svg viewBox="0 0 300 100" class="w-full h-full max-h-[80px]">
            <rect x="0" y="46" width="300" height="8" fill="#1e293b" />
            <rect x="60" y="20" width="180" height="60" rx="18" fill="#d2b48c" stroke="#b59a78" stroke-width="1" />
            <!-- Bandas de ejemplo -->
            <rect id="b1" x="85" y="20" width="14" height="60" fill="#transparent" />
            <rect id="b2" x="115" y="25" width="12" height="50" fill="#transparent" />
            <rect id="bm" x="145" y="25" width="12" height="50" fill="#transparent" />
            <rect id="bt" x="190" y="25" width="14" height="50" fill="#transparent" />
        </svg>
    </div>

    <!-- BLOQUE 3: TECLADO TÁCTIL (57%) -->
    <div class="section-keypad pt-4">
        <div class="grid grid-cols-4 gap-3 mb-2 px-1 text-center">
            <span class="text-[9px] font-black text-slate-600 uppercase">Band 1</span>
            <span class="text-[9px] font-black text-slate-600 uppercase">Band 2</span>
            <span class="text-[9px] font-black text-slate-600 uppercase">Mult</span>
            <span class="text-[9px] font-black text-slate-600 uppercase">Tol</span>
        </div>
        
        <!-- Aquí poblaremos los 12 colores próximamente -->
        <div class="grid grid-cols-4 gap-3">
            <!-- Espacio para la lógica de generación de botones -->
            <div class="col-span-4 py-10 flex flex-col items-center justify-center opacity-20">
                <p class="text-xs font-bold italic">Listo para poblar colores...</p>
                <p class="text-[10px]">Sin desplazamiento vertical</p>
            </div>
        </div>
    </div>

    <!-- BLOQUE 4: ACCIONES (13%) -->
    <div class="section-footer">
        <button class="flex-[3] bg-blue-600 h-14 rounded-2xl font-black text-[11px] text-white shadow-lg shadow-blue-900/30 active:scale-95 transition-all uppercase tracking-widest">
            Guardar Medida
        </button>
        <button class="flex-1 bg-slate-800 h-14 rounded-2xl flex items-center justify-center text-xl active:scale-95 border border-white/5">
            🔦
        </button>
    </div>

</div>

</body>
</html>
