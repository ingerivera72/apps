<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Resistor Pro Advance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body {
            overflow: hidden;
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            user-select: none;
            touch-action: none;
        }

        /* Temas Atenuados */
        body.theme-light { background-color: #f8fafc; color: #0f172a; }
        body.theme-dark { background-color: #020617; color: #f1f5f9; }
        body.theme-green { background-color: #062c23; color: #ecfdf5; }
        body.theme-blue { background-color: #0c2a43; color: #e0f2fe; }
        body.theme-pink { background-color: #3d0a1d; color: #fce7f3; }

        .app-container {
            height: 100dvh;
            display: flex;
            flex-direction: column;
            padding: env(safe-area-inset-top, 8px) 12px env(safe-area-inset-bottom, 8px);
        }

        /* Bloques */
        .section-header  { height: 10%; display: flex; flex-direction: column; justify-content: center; }
        .section-display { height: 15%; display: flex; flex-direction: column; justify-content: center; }
        .section-keypad  { height: 55%; display: flex; flex-direction: column; }
        .section-toolblock { height: 20%; display: flex; flex-direction: column; gap: 4px; padding-top: 4px; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(128, 128, 128, 0.2);
            border-radius: 10px;
        }

        .theme-dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.2); cursor: pointer; }
        .theme-dot.active { border-color: #3b82f6; transform: scale(1.1); }

        .band-btn {
            flex: 1; padding: 4px 0; font-size: 10px; font-weight: 900; border-radius: 6px;
            transition: all 0.2s; color: inherit; opacity: 0.5;
        }
        .band-btn.active { background: #3b82f6; color: white; opacity: 1; }

        /* Colores de las Teclas */
        .c-black { background-color: #000000; color: white; }
        .c-brown { background-color: #5d2e0a; color: white; }
        .c-red { background-color: #dc2626; color: white; }
        .c-orange { background-color: #ea580c; color: white; }
        .c-yellow { background-color: #eab308; color: black; }
        .c-green { background-color: #166534; color: white; }
        .c-blue { background-color: #1e40af; color: white; }
        .c-violet { background-color: #7c3aed; color: white; }
        .c-gray { background-color: #64748b; color: white; }
        .c-white { background-color: #ffffff; color: black; }
        .c-gold { background-color: #b8860b; color: white; }
        .c-silver { background-color: #cbd5e1; color: black; }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            column-gap: 4px; 
            row-gap: 2px;
            flex-grow: 1;
        }

        .color-card {
            height: 28px; 
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(128, 128, 128, 0.3);
            position: relative;
        }
        
        .color-card.selected {
            outline: 2px solid #3b82f6;
            outline-offset: 1px;
            z-index: 5;
        }

        .color-val { 
            font-size: 12px; 
            font-weight: 900; 
            transition: transform 0.1s;
        }
        .selected .color-val {
            transform: scale(1.4);
        }
        
        .color-card.disabled { opacity: 0 !important; pointer-events: none; }

        .column-title { font-size: 7px; font-weight: 900; opacity: 0.8; text-transform: uppercase; line-height: 1; height: 14px; display: flex; align-items: center; justify-content: center; }

        .result-text { font-size: 1.4rem; font-weight: 900; line-height: 1; }

        /* Herramientas Bloque 4 */
        .status-box {
            height: 38px; border-radius: 6px; display: flex;
            align-items: center; justify-content: center; font-weight: 900;
            font-size: 11px; transition: all 0.3s;
        }
        .status-off { background: rgba(128,128,128,0.1); color: gray; }
        .status-ok { background: #16a34a; color: white; }
        .status-fail { background: #dc2626; color: white; }

        input[type="number"] {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(128,128,128,0.4);
            border-radius: 6px;
            height: 38px;
            width: 110px; /* Mas grande */
            color: inherit;
            font-weight: 900;
            text-align: center;
            font-size: 16px; /* Texto mas grande */
        }

        select {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(128,128,128,0.4);
            border-radius: 6px;
            height: 38px;
            padding: 0 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .btn-delete {
            background: #b91c1c; 
            color: white;
            padding: 0 12px; 
            height: 38px; 
            border-radius: 8px; 
            font-size: 10px; 
            font-weight: 900;
            flex-shrink: 0;
        }
    </style>
</head>
<body class="theme-light">

<div class="app-container">
    
    <!-- BLOQUE 1: HEADER -->
    <div class="section-header">
        <div class="flex justify-between items-center mb-1">
            <h1 class="text-[9px] font-black uppercase italic tracking-widest">Resistor Pro Advance</h1>
            <div class="flex gap-2 items-center">
                <div onclick="setTheme('light')" class="theme-dot bg-white active"></div>
                <div onclick="setTheme('dark')" class="theme-dot bg-slate-900"></div>
                <div onclick="setTheme('green')" class="theme-dot bg-emerald-950"></div>
                <div onclick="setTheme('blue')" class="theme-dot bg-sky-950"></div>
                <div onclick="setTheme('pink')" class="theme-dot bg-pink-950"></div>
            </div>
        </div>
        <div class="glass-panel flex p-0.5 gap-1">
            <button onclick="setBands(3)" id="btn-3b" class="band-btn">3B</button>
            <button onclick="setBands(4)" id="btn-4b" class="band-btn active">4B</button>
            <button onclick="setBands(5)" id="btn-5b" class="band-btn">5B</button>
            <button onclick="setBands(6)" id="btn-6b" class="band-btn">6B</button>
        </div>
    </div>

    <!-- BLOQUE 2: PANTALLA -->
    <div class="section-display">
        <div class="flex gap-1.5 h-1/2 mb-1">
            <div class="glass-panel flex-1 text-center flex flex-col justify-center">
                <span id="txt-val" class="result-text tracking-tighter">--</span>
            </div>
            <div class="glass-panel flex-1 text-center flex flex-col justify-center">
                <span id="txt-tol" class="result-text text-emerald-500">--</span>
            </div>
            <div id="box-temp" class="glass-panel flex-1 text-center flex flex-col justify-center hidden">
                <span id="txt-temp" class="result-text text-orange-500">--</span>
            </div>
        </div>
        <div class="h-1/2 flex items-center gap-2">
            <div class="flex-grow flex justify-center">
                <svg id="resistor-svg" viewBox="0 0 300 60" class="w-full h-8">
                    <rect x="0" y="27" width="300" height="6" fill="#94a3b8" opacity="0.4" />
                    <rect x="60" y="5" width="180" height="50" rx="10" fill="#d2b48c" />
                    <rect id="v-b1" x="80" y="5" width="14" height="50" fill="#5d2e0a" />
                    <rect id="v-b2" x="110" y="5" width="12" height="50" fill="#000000" />
                    <rect id="v-b3" x="135" y="5" width="12" height="50" fill="transparent" class="hidden" />
                    <rect id="v-bm" x="160" y="5" width="12" height="50" fill="#ea580c" />
                    <rect id="v-bt" x="195" y="5" width="14" height="50" fill="#b8860b" />
                    <rect id="v-bc" x="220" y="5" width="10" height="50" fill="transparent" class="hidden" />
                </svg>
            </div>
            <button onclick="resetAll()" class="px-2 h-8 bg-red-600 rounded-lg text-[9px] font-black text-white active:scale-90 shadow-lg">RESET</button>
        </div>
    </div>

    <!-- BLOQUE 3: TECLADO (55%) -->
    <div class="section-keypad">
        <div class="grid grid-cols-6 gap-x-1 text-center mb-1">
            <span class="column-title">Banda 1</span>
            <span class="column-title">Banda 2</span>
            <span id="kb-lbl-d3" class="column-title opacity-0">Banda 3</span>
            <span class="column-title">Mult.</span>
            <span id="kb-lbl-tol" class="column-title">Tol.</span>
            <span id="kb-lbl-ppm" class="column-title opacity-0">Coef.</span>
        </div>
        <div id="keyboard" class="color-grid"></div>
    </div>

    <!-- BLOQUE 4: HERRAMIENTAS (20%) -->
    <div class="section-toolblock">
        <!-- Validación -->
        <div class="glass-panel p-2 flex flex-col gap-1">
            <span class="text-[9px] font-black uppercase opacity-60">Validación del multímetro</span>
            <div class="flex items-center gap-1.5">
                <input type="number" id="meter-input" placeholder="0.00" oninput="validateMeter()">
                <select id="meter-unit" onchange="validateMeter()">
                    <option value="1">Ω</option>
                    <option value="1000">KΩ</option>
                    <option value="1000000">MΩ</option>
                </select>
                <div id="meter-status" class="status-box status-off w-20">OFF</div>
                <button onclick="clearMeter()" class="btn-delete">BORRAR</button>
            </div>
        </div>

        <!-- Rangos y Sugerencias -->
        <div class="glass-panel p-2 flex flex-col gap-1">
            <span class="text-[9px] font-black uppercase opacity-60">Rangos y sugerencias</span>
            <div class="grid grid-cols-3 gap-2">
                <div class="text-center">
                    <div class="text-[8px] uppercase font-bold opacity-50">Mínimo</div>
                    <div id="range-min" class="text-[12px] font-black">--</div>
                </div>
                <div class="text-center">
                    <div class="text-[8px] uppercase font-bold opacity-50">Máximo</div>
                    <div id="range-max" class="text-[12px] font-black">--</div>
                </div>
                <div class="text-center border-l border-white/10">
                    <div class="text-[8px] uppercase font-bold opacity-60 text-blue-400">Valor o valores sugeridos</div>
                    <div id="suggest-e12" class="text-[11px] font-black leading-none mt-1">--</div>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
    const colors = [
        { code: 'c-black', hex: '#000000', val: 0, mult: 1, tol: null, ppm: 250 },
        { code: 'c-brown', hex: '#5d2e0a', val: 1, mult: 10, tol: 1, ppm: 100 },
        { code: 'c-red', hex: '#dc2626', val: 2, mult: 100, tol: 2, ppm: 50 },
        { code: 'c-orange', hex: '#ea580c', val: 3, mult: 1000, tol: null, ppm: 15 },
        { code: 'c-yellow', hex: '#eab308', val: 4, mult: 10000, tol: null, ppm: 25 },
        { code: 'c-green', hex: '#166534', val: 5, mult: 100000, tol: 0.5, ppm: 20 },
        { code: 'c-blue', hex: '#1e40af', val: 6, mult: 1000000, tol: 0.25, ppm: 10 },
        { code: 'c-violet', hex: '#7c3aed', val: 7, mult: 10000000, tol: 0.1, ppm: 5 },
        { code: 'c-gray', hex: '#64748b', val: 8, mult: null, tol: 0.05, ppm: 1 },
        { code: 'c-white', hex: '#ffffff', val: 9, mult: null, tol: null, ppm: null },
        { code: 'c-gold', hex: '#b8860b', val: null, mult: 0.1, tol: 5, ppm: null },
        { code: 'c-silver', hex: '#cbd5e1', val: null, mult: 0.01, tol: 10, ppm: null }
    ];

    const E12 = [1.0, 1.2, 1.5, 1.8, 2.2, 2.7, 3.3, 3.9, 4.7, 5.6, 6.8, 8.2];

    let currentBands = 4;
    let selections = { b1: 1, b2: 0, b3: 0, mult: 100, tol: 5, ppm: 250 };
    let nominalValue = 1000;

    function initKeyboard() {
        const kb = document.getElementById('keyboard');
        kb.innerHTML = '';
        colors.forEach(c => {
            for(let i=0; i<6; i++) {
                const btn = document.createElement('div');
                btn.id = `btn-col-${i}-${c.code}`;
                btn.className = `color-card ${c.code}`;
                let displayVal = "";
                let isUsable = false;

                if (i < 3) {
                    displayVal = c.val !== null ? c.val : "";
                    isUsable = c.val !== null;
                } else if (i === 3) {
                    displayVal = c.mult !== null ? (c.mult < 1 ? c.mult : (c.mult >= 1000000 ? (c.mult/1000000)+"M" : (c.mult >= 1000 ? (c.mult/1000)+"k" : "x"+c.mult))) : "";
                    isUsable = c.mult !== null;
                } else if (i === 4) {
                    displayVal = c.tol !== null ? c.tol + "%" : "";
                    isUsable = c.tol !== null;
                } else if (i === 5) {
                    displayVal = c.ppm !== null ? c.ppm : "";
                    isUsable = c.ppm !== null;
                }

                if (!isUsable) btn.classList.add('disabled');
                
                btn.onclick = () => selectColor(i, c);
                btn.innerHTML = `<span class="color-val">${displayVal}</span>`;
                kb.appendChild(btn);
            }
        });
        updateUI();
    }

    function selectColor(col, color) {
        const keys = ['b1', 'b2', 'b3', 'mult', 'tol', 'ppm'];
        if (col < 3 && color.val === null) return;
        if (col === 3 && color.mult === null) return;
        if (col === 4 && color.tol === null) return;
        if (col === 5 && color.ppm === null) return;
        selections[keys[col]] = (col === 3) ? color.mult : (col === 4 ? color.tol : (col === 5 ? color.ppm : color.val));
        updateUI();
    }

    function updateUI() {
        const svgIds = ['v-b1', 'v-b2', 'v-b3', 'v-bm', 'v-bt', 'v-bc'];
        const keys = ['b1', 'b2', 'b3', 'mult', 'tol', 'ppm'];
        
        document.querySelectorAll('.color-card').forEach(el => el.classList.remove('selected'));
        
        keys.forEach((key, idx) => {
            const val = selections[key];
            let colorObj;
            if (key === 'mult') colorObj = colors.find(c => c.mult === val);
            else if (key === 'tol') colorObj = colors.find(c => c.tol === val);
            else if (key === 'ppm') colorObj = colors.find(c => c.ppm === val);
            else colorObj = colors.find(c => c.val === val);

            if (colorObj) {
                const svgRect = document.getElementById(svgIds[idx]);
                if (svgRect) svgRect.setAttribute('fill', colorObj.hex);
                const btn = document.getElementById(`btn-col-${idx}-${colorObj.code}`);
                if (btn) btn.classList.add('selected');
            }
        });

        // Ocultar botones de columnas que no se usan segun el numero de bandas
        colors.forEach(c => {
            const b3Key = document.getElementById(`btn-col-2-${c.code}`);
            const tolKey = document.getElementById(`btn-col-4-${c.code}`);
            const ppmKey = document.getElementById(`btn-col-5-${c.code}`);
            
            if (currentBands < 5) b3Key.classList.add('disabled');
            else if (c.val !== null) b3Key.classList.remove('disabled');

            if (currentBands === 3) tolKey.classList.add('disabled');
            else if (c.tol !== null) tolKey.classList.remove('disabled');

            if (currentBands < 6) ppmKey.classList.add('disabled');
            else if (c.ppm !== null) ppmKey.classList.remove('disabled');
        });

        calculate();
    }

    function formatVal(v) {
        if (v >= 1000000) return (v/1000000).toFixed(2).replace(/\.00$/, '') + " MΩ";
        if (v >= 1000) return (v/1000).toFixed(2).replace(/\.00$/, '') + " kΩ";
        return v.toFixed(2).replace(/\.00$/, '') + " Ω";
    }

    function calculate() {
        let val = (currentBands < 5) ? (selections.b1 * 10 + selections.b2) : (selections.b1 * 100 + selections.b2 * 10 + selections.b3);
        nominalValue = val * selections.mult;
        let tolPerc = currentBands === 3 ? 20 : selections.tol;
        
        document.getElementById('txt-val').innerText = formatVal(nominalValue);
        document.getElementById('txt-tol').innerText = "±" + tolPerc + "%";
        document.getElementById('txt-temp').innerText = selections.ppm ? selections.ppm + " ppm" : "--";

        let min = nominalValue * (1 - tolPerc/100);
        let max = nominalValue * (1 + tolPerc/100);
        document.getElementById('range-min').innerText = formatVal(min);
        document.getElementById('range-max').innerText = formatVal(max);

        // Sugerencia E12
        let log = Math.log10(nominalValue);
        let power = Math.floor(log);
        let base = nominalValue / Math.pow(10, power);
        let lower = E12[0], upper = E12[E12.length-1];
        for(let i=0; i<E12.length; i++){
            if(E12[i] <= base) lower = E12[i];
            if(E12[i] >= base) { upper = E12[i]; break; }
        }
        let s1 = formatVal(lower * Math.pow(10, power));
        let s2 = formatVal(upper * Math.pow(10, power));
        document.getElementById('suggest-e12').innerText = (s1 === s2) ? s1 : `${s1} / ${s2}`;
        
        validateMeter();
    }

    function validateMeter() {
        const input = document.getElementById('meter-input');
        const status = document.getElementById('meter-status');
        if (!input.value) {
            status.className = "status-box status-off w-20";
            status.innerText = "OFF";
            return;
        }
        let measured = parseFloat(input.value) * parseFloat(document.getElementById('meter-unit').value);
        let tolPerc = currentBands === 3 ? 20 : selections.tol;
        let diff = ((measured - nominalValue) / nominalValue) * 100;
        if (Math.abs(diff) <= tolPerc) {
            status.className = "status-box status-ok w-20";
            status.innerText = `OK (${diff > 0 ? '+':''}${diff.toFixed(1)}%)`;
        } else {
            status.className = "status-box status-fail w-20";
            status.innerText = `FAIL (${diff > 0 ? '+':''}${diff.toFixed(1)}%)`;
        }
    }

    function clearMeter() {
        document.getElementById('meter-input').value = "";
        validateMeter();
    }

    function resetAll() {
        selections = { b1: 1, b2: 0, b3: 0, mult: 100, tol: 5, ppm: 250 };
        clearMeter();
        updateUI();
    }

    function setBands(n) {
        currentBands = n;
        document.querySelectorAll('.band-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-'+n+'b').classList.add('active');
        
        document.getElementById('v-b3').classList.toggle('hidden', n < 5);
        document.getElementById('v-bt').classList.toggle('hidden', n === 3);
        document.getElementById('v-bc').classList.toggle('hidden', n < 6);
        document.getElementById('box-temp').classList.toggle('hidden', n < 6);
        
        // Titulos dinámicos
        document.getElementById('kb-lbl-d3').classList.toggle('opacity-0', n < 5);
        document.getElementById('kb-lbl-tol').classList.toggle('opacity-0', n === 3);
        document.getElementById('kb-lbl-ppm').classList.toggle('opacity-0', n < 6);
        
        updateUI();
    }

    function setTheme(t) { 
        document.body.className = 'theme-' + t;
        document.querySelectorAll('.theme-dot').forEach(d => d.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    window.onload = initKeyboard;
</script>
</body>
</html>
