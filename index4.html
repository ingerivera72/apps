<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Resistor Pro Advance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body {
            overflow: hidden;
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            user-select: none;
            touch-action: none;
        }

        body.theme-light { background-color: #f8fafc; color: #0f172a; }
        body.theme-dark { background-color: #020617; color: #f1f5f9; }
        body.theme-green { background-color: #064e3b; color: #ecfdf5; }
        body.theme-blue { background-color: #bae6fd; color: #0369a1; }
        body.theme-pink { background-color: #fce7f3; color: #9d174d; }

        .app-container {
            height: 100dvh;
            display: flex;
            flex-direction: column;
            padding: env(safe-area-inset-top, 8px) 12px env(safe-area-inset-bottom, 8px);
        }

        .section-header  { height: 10%; display: flex; flex-direction: column; justify-content: center; }
        .section-display { height: 15%; display: flex; flex-direction: column; justify-content: center; }
        .section-keypad  { height: 45%; display: flex; flex-direction: column; }
        .section-validation { height: 30%; display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }

        .glass-panel {
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(128, 128, 128, 0.1);
            border-radius: 12px;
            padding: 4px 8px;
        }

        .theme-dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.1); cursor: pointer; }
        .theme-dot.active { border-color: #3b82f6; transform: scale(1.1); }

        .band-btn {
            flex: 1; padding: 4px 0; font-size: 11px; font-weight: 900; border-radius: 8px;
            transition: all 0.2s; color: inherit; opacity: 0.5;
        }
        .band-btn.active { background: #3b82f6; color: white; opacity: 1; }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            column-gap: 6px; 
            row-gap: 4px;
            flex-grow: 1;
        }

        /* Corregido: Altura fija para evitar desplazamientos de renglones */
        .color-card {
            position: relative;
            height: 28px; 
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(128, 128, 128, 0.2);
            box-sizing: border-box;
            overflow: visible;
        }
        
        .color-card.selected {
            border: 2px solid #ffffff;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.8);
            z-index: 10;
        }

        /* Corregido: El número crece sin afectar el tamaño del contenedor padre */
        .color-val { 
            font-size: 13px; 
            font-weight: 900; 
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
            display: inline-block;
            line-height: 1;
        }
        .selected .color-val {
            font-size: 17px; 
            transform: scale(1.1);
        }
        
        .color-card.disabled { opacity: 0.05; pointer-events: none; }

        .column-title {
            font-size: 9px; font-weight: 900; text-transform: uppercase;
            opacity: 0.8; margin-bottom: 2px;
        }

        .result-text { font-size: 1.5rem; font-weight: 900; line-height: 1; }

        /* Estilos Validación */
        .status-box {
            width: 100%; height: 40px; border-radius: 8px; display: flex;
            align-items: center; justify-content: center; font-weight: 900;
            font-size: 12px; transition: all 0.3s;
        }
        .status-off { background: rgba(128,128,128,0.1); color: transparent; }
        .status-ok { background: #16a34a; color: white; }
        .status-fail { background: #dc2626; color: white; }

        input[type="number"] {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(128,128,128,0.3);
            border-radius: 8px;
            padding: 8px;
            width: 80px;
            color: inherit;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body class="theme-light">

<div class="app-container">
    
    <!-- ENCABEZADO -->
    <div class="section-header">
        <div class="flex justify-between items-center mb-1">
            <h1 class="text-[10px] font-black uppercase italic tracking-wider">Resistor Pro Advance</h1>
            <div class="flex gap-2 items-center">
                <div onclick="setTheme('light')" class="theme-dot bg-white active"></div>
                <div onclick="setTheme('dark')" class="theme-dot bg-slate-950"></div>
                <div onclick="setTheme('green')" class="theme-dot bg-emerald-700"></div>
                <div onclick="setTheme('blue')" class="theme-dot bg-sky-600"></div>
            </div>
        </div>
        <div class="glass-panel flex p-0.5 gap-1">
            <button onclick="setBands(3)" id="btn-3b" class="band-btn">3 BANDAS</button>
            <button onclick="setBands(4)" id="btn-4b" class="band-btn active">4 BANDAS</button>
            <button onclick="setBands(5)" id="btn-5b" class="band-btn">5 BANDAS</button>
            <button onclick="setBands(6)" id="btn-6b" class="band-btn">6 BANDAS</button>
        </div>
    </div>

    <!-- PANTALLA -->
    <div class="section-display">
        <div class="flex gap-1.5 h-1/2 mb-1">
            <div class="glass-panel flex-1 text-center flex flex-col justify-center">
                <span class="text-[7px] uppercase font-bold opacity-60">Nominal</span>
                <span id="txt-val" class="result-text tracking-tighter">--</span>
            </div>
            <div class="glass-panel flex-1 text-center flex flex-col justify-center">
                <span class="text-[7px] uppercase font-bold opacity-60">Tolerancia</span>
                <span id="txt-tol" class="result-text text-emerald-500">--</span>
            </div>
            <div id="box-temp" class="glass-panel flex-1 text-center flex flex-col justify-center hidden">
                <span class="text-[7px] uppercase font-bold opacity-60">PPM</span>
                <span id="txt-temp" class="result-text text-orange-500">--</span>
            </div>
        </div>
        <div class="h-1/2 flex items-center gap-2">
            <div class="flex-grow flex justify-center">
                <svg id="resistor-svg" viewBox="0 0 300 60" class="w-full h-8">
                    <rect x="0" y="27" width="300" height="6" fill="#94a3b8" opacity="0.4" />
                    <rect x="60" y="5" width="180" height="50" rx="10" fill="#d2b48c" />
                    <rect id="v-b1" x="80" y="5" width="14" height="50" fill="#5d2e0a" />
                    <rect id="v-b2" x="110" y="5" width="12" height="50" fill="#000000" />
                    <rect id="v-b3" x="135" y="5" width="12" height="50" fill="transparent" class="hidden" />
                    <rect id="v-bm" x="160" y="5" width="12" height="50" fill="#ea580c" />
                    <rect id="v-bt" x="195" y="5" width="14" height="50" fill="#b8860b" />
                    <rect id="v-bc" x="220" y="5" width="10" height="50" fill="transparent" class="hidden" />
                </svg>
            </div>
            <button onclick="resetAll()" class="px-3 h-8 bg-red-600 rounded-lg text-[10px] font-black text-white active:scale-90 shadow-lg">RESET</button>
        </div>
    </div>

    <!-- TECLADO -->
    <div class="section-keypad">
        <div class="grid grid-cols-6 gap-x-1.5 text-center">
            <span class="column-title">B1</span><span class="column-title">B2</span><span id="kb-lbl-d3" class="column-title hidden-col">B3</span><span class="column-title">MULT</span><span id="kb-lbl-tol" class="column-title">TOL</span><span id="kb-lbl-ppm" class="column-title hidden-col">PPM</span>
        </div>
        <div id="keyboard" class="color-grid"></div>
    </div>

    <!-- VALIDACIÓN Y RANGOS -->
    <div class="section-validation">
        <div class="glass-panel flex flex-col gap-2 p-3">
            <span class="text-[9px] font-black uppercase opacity-70">Validación con multímetro</span>
            <div class="flex items-center gap-2">
                <input type="number" id="meter-input" placeholder="0.00" oninput="validateMeter()">
                <select id="meter-unit" class="bg-transparent border border-gray-500 rounded p-1 text-xs font-bold" onchange="validateMeter()">
                    <option value="1">Ω</option>
                    <option value="1000">KΩ</option>
                    <option value="1000000">MΩ</option>
                </select>
                <div id="meter-status" class="status-box status-off flex-1">ESPERANDO...</div>
                <button onclick="clearMeter()" class="bg-gray-500 p-2 rounded-lg text-white text-[10px] font-black">BORRAR</button>
            </div>
        </div>

        <div class="glass-panel flex flex-col gap-2 p-3">
            <span class="text-[9px] font-black uppercase opacity-70">Rangos y Sugerencias E12</span>
            <div class="grid grid-cols-3 gap-2">
                <div class="bg-black/10 rounded p-1 text-center">
                    <div class="text-[7px] uppercase font-bold opacity-50">Mínimo</div>
                    <div id="range-min" class="text-xs font-black">--</div>
                </div>
                <div class="bg-black/10 rounded p-1 text-center">
                    <div class="text-[7px] uppercase font-bold opacity-50">Máximo</div>
                    <div id="range-max" class="text-xs font-black">--</div>
                </div>
                <div class="bg-black/10 rounded p-1 text-center border border-blue-400/30">
                    <div class="text-[7px] uppercase font-bold opacity-50 text-blue-500">Valor Comercial</div>
                    <div id="suggest-e12" class="text-[9px] font-black leading-tight">--</div>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
    const colors = [
        { code: 'c-black', hex: '#000000', val: 0, mult: 1, tol: null, ppm: 250 },
        { code: 'c-brown', hex: '#5d2e0a', val: 1, mult: 10, tol: 1, ppm: 100 },
        { code: 'c-red', hex: '#dc2626', val: 2, mult: 100, tol: 2, ppm: 50 },
        { code: 'c-orange', hex: '#ea580c', val: 3, mult: 1000, tol: null, ppm: 15 },
        { code: 'c-yellow', hex: '#eab308', val: 4, mult: 10000, tol: null, ppm: 25 },
        { code: 'c-green', hex: '#166534', val: 5, mult: 100000, tol: 0.5, ppm: 20 },
        { code: 'c-blue', hex: '#1e40af', val: 6, mult: 1000000, tol: 0.25, ppm: 10 },
        { code: 'c-violet', hex: '#7c3aed', val: 7, mult: 10000000, tol: 0.1, ppm: 5 },
        { code: 'c-gray', hex: '#64748b', val: 8, mult: null, tol: 0.05, ppm: 1 },
        { code: 'c-white', hex: '#ffffff', val: 9, mult: null, tol: null, ppm: null },
        { code: 'c-gold', hex: '#b8860b', val: null, mult: 0.1, tol: 5, ppm: null },
        { code: 'c-silver', hex: '#cbd5e1', val: null, mult: 0.01, tol: 10, ppm: null }
    ];

    const E12 = [1.0, 1.2, 1.5, 1.8, 2.2, 2.7, 3.3, 3.9, 4.7, 5.6, 6.8, 8.2];

    let currentBands = 4;
    let selections = { b1: 1, b2: 0, b3: 0, mult: 100, tol: 5, ppm: 250 };
    let nominalValue = 1000;

    function initKeyboard() {
        const kb = document.getElementById('keyboard');
        kb.innerHTML = '';
        colors.forEach(c => {
            for(let i=0; i<6; i++) {
                const btn = document.createElement('div');
                btn.id = `btn-col-${i}-${c.code}`;
                btn.className = `color-card ${c.code}`;
                let displayVal = "";
                if (i < 3) displayVal = c.val !== null ? c.val : "";
                else if (i === 3) displayVal = c.mult !== null ? (c.mult < 1 ? c.mult : (c.mult >= 1000000 ? (c.mult/1000000)+"M" : (c.mult >= 1000 ? (c.mult/1000)+"k" : "x"+c.mult))) : "";
                else if (i === 4) displayVal = c.tol !== null ? c.tol + "%" : "";
                else if (i === 5) displayVal = c.ppm !== null ? c.ppm : "";
                btn.onclick = () => selectColor(i, c);
                btn.innerHTML = `<span class="color-val">${displayVal}</span>`;
                kb.appendChild(btn);
            }
        });
        updateUI();
    }

    function selectColor(col, color) {
        const keys = ['b1', 'b2', 'b3', 'mult', 'tol', 'ppm'];
        if (col < 3 && color.val === null) return;
        if (col === 3 && color.mult === null) return;
        if (col === 4 && color.tol === null) return;
        if (col === 5 && color.ppm === null) return;
        selections[keys[col]] = (col === 3) ? color.mult : (col === 4 ? color.tol : (col === 5 ? color.ppm : color.val));
        updateUI();
    }

    function updateUI() {
        const svgIds = ['v-b1', 'v-b2', 'v-b3', 'v-bm', 'v-bt', 'v-bc'];
        const keys = ['b1', 'b2', 'b3', 'mult', 'tol', 'ppm'];
        
        document.querySelectorAll('.color-card').forEach(el => el.classList.remove('selected', 'disabled'));
        keys.forEach((key, idx) => {
            const val = selections[key];
            let colorObj = (key === 'mult') ? colors.find(c => c.mult === val) : (key === 'tol' ? colors.find(c => c.tol === val) : (key === 'ppm' ? colors.find(c => c.ppm === val) : colors.find(c => c.val === val)));
            if (colorObj) {
                document.getElementById(svgIds[idx]).setAttribute('fill', colorObj.hex);
                document.getElementById(`btn-col-${idx}-${colorObj.code}`).classList.add('selected');
            }
        });

        colors.forEach(c => {
            if (currentBands < 5) document.getElementById(`btn-col-2-${c.code}`).classList.add('disabled');
            if (currentBands === 3) document.getElementById(`btn-col-4-${c.code}`).classList.add('disabled');
            if (currentBands < 6) document.getElementById(`btn-col-5-${c.code}`).classList.add('disabled');
            if (c.val === null) [0,1,2].forEach(i => document.getElementById(`btn-col-${i}-${c.code}`).classList.add('disabled'));
            if (c.mult === null) document.getElementById(`btn-col-3-${c.code}`).classList.add('disabled');
            if (c.tol === null) document.getElementById(`btn-col-4-${c.code}`).classList.add('disabled');
            if (c.ppm === null) document.getElementById(`btn-col-5-${c.code}`).classList.add('disabled');
        });
        calculate();
    }

    function formatVal(v) {
        return v >= 1000000 ? (v/1000000).toFixed(2).replace(/\.00$/, '') + "M" : (v >= 1000 ? (v/1000).toFixed(2).replace(/\.00$/, '') + "k" : v.toFixed(2).replace(/\.00$/, ''));
    }

    function calculate() {
        let val = (currentBands < 5) ? (selections.b1 * 10 + selections.b2) : (selections.b1 * 100 + selections.b2 * 10 + selections.b3);
        nominalValue = val * selections.mult;
        let tolPerc = currentBands === 3 ? 20 : selections.tol;
        
        document.getElementById('txt-val').innerText = formatVal(nominalValue) + " Ω";
        document.getElementById('txt-tol').innerText = "±" + tolPerc + "%";
        document.getElementById('txt-temp').innerText = selections.ppm || "--";

        // Rangos
        let min = nominalValue * (1 - tolPerc/100);
        let max = nominalValue * (1 + tolPerc/100);
        document.getElementById('range-min').innerText = formatVal(min) + " Ω";
        document.getElementById('range-max').innerText = formatVal(max) + " Ω";

        // Sugerencia E12
        let log = Math.log10(nominalValue);
        let power = Math.floor(log);
        let base = nominalValue / Math.pow(10, power);
        
        // Encontrar los dos más cercanos
        let lower = E12[0], upper = E12[E12.length-1];
        for(let i=0; i<E12.length; i++){
            if(E12[i] <= base) lower = E12[i];
            if(E12[i] >= base) { upper = E12[i]; break; }
        }

        let s1 = formatVal(lower * Math.pow(10, power));
        let s2 = formatVal(upper * Math.pow(10, power));
        document.getElementById('suggest-e12').innerText = (s1 === s2) ? s1 : `${s1} / ${s2}`;
        
        validateMeter();
    }

    function validateMeter() {
        const input = document.getElementById('meter-input');
        const status = document.getElementById('meter-status');
        if (!input.value) {
            status.className = "status-box status-off flex-1";
            status.innerText = "ESPERANDO...";
            return;
        }

        let measured = parseFloat(input.value) * parseFloat(document.getElementById('meter-unit').value);
        let tolPerc = currentBands === 3 ? 20 : selections.tol;
        let diff = ((measured - nominalValue) / nominalValue) * 100;
        
        if (Math.abs(diff) <= tolPerc) {
            status.className = "status-box status-ok flex-1";
            status.innerText = `DENTRO (${diff > 0 ? '+':''}${diff.toFixed(1)}%)`;
        } else {
            status.className = "status-box status-fail flex-1";
            status.innerText = `FALLO (${diff > 0 ? '+':''}${diff.toFixed(1)}%)`;
        }
    }

    function clearMeter() {
        document.getElementById('meter-input').value = "";
        validateMeter();
    }

    function resetAll() {
        selections = { b1: 1, b2: 0, b3: 0, mult: 100, tol: 5, ppm: 250 };
        clearMeter();
        updateUI();
    }

    function setBands(n) {
        currentBands = n;
        document.querySelectorAll('.band-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-'+n+'b').classList.add('active');
        document.getElementById('v-b3').classList.toggle('hidden', n < 5);
        document.getElementById('v-bt').classList.toggle('hidden', n === 3);
        document.getElementById('v-bc').classList.toggle('hidden', n < 6);
        document.getElementById('box-temp').classList.toggle('hidden', n < 6);
        document.getElementById('kb-lbl-d3').classList.toggle('hidden-col', n < 5);
        document.getElementById('kb-lbl-tol').classList.toggle('hidden-col', n === 3);
        document.getElementById('kb-lbl-ppm').classList.toggle('hidden-col', n < 6);
        updateUI();
    }

    function setTheme(t) { 
        document.body.className = 'theme-' + t;
        document.querySelectorAll('.theme-dot').forEach(d => d.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    window.onload = initKeyboard;
</script>
</body>
</html>
